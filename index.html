<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mudakhan">
<meta name="theme-color" content="#460e1e">
<title>Mudakhan · Inventory System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --maroon:#460e1e; --maroon-2:#5f1a2e; --sand:#c9b49f; --sand-soft:#ded2c1;
    --bg:#F4EEE4; --card:#FFFFFF; --ink:#2A1017; --muted:#8A7768; --line:#E8DDCD;
    --red:#C0392B; --red-bg:#F8E6E3; --red-ink:#8A2B22;
    --amber:#B9820A; --amber-bg:#F7EBCB; --amber-ink:#7A5600;
    --green:#3E8E4F; --green-bg:#E4EFE1; --green-ink:#2A6136;
    --shadow:0 1px 2px rgba(42,16,23,.05),0 6px 18px rgba(42,16,23,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Tajawal',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;padding-bottom:84px;min-height:100vh;}
  .wrap{max-width:640px;margin:0 auto;}

  header{background:var(--maroon);color:var(--sand);padding:18px 18px 15px;
    position:sticky;top:0;z-index:20;border-bottom:3px solid var(--sand);}
  .head-top{display:flex;align-items:flex-start;gap:12px;}
  .logo-block{flex:1;min-width:0;}
  .logo-block img{height:42px;width:auto;display:block;}
  .sys{font-family:'Cairo';font-weight:700;font-size:13px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--sand);margin-top:9px;opacity:.92;}
  .sub{font-size:11.5px;color:var(--sand-soft);margin-top:5px;font-weight:500;opacity:.8;}
  .refresh{flex:0 0 auto;background:rgba(201,180,159,.16);border:1px solid rgba(201,180,159,.3);color:var(--sand);
    width:40px;height:40px;border-radius:12px;display:grid;place-items:center;cursor:pointer;transition:.2s;}
  .refresh:active{transform:scale(.9);}
  .refresh.spin svg{animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .tally{display:flex;gap:8px;margin-top:15px;}
  .pill{flex:1;background:rgba(201,180,159,.12);border:1px solid rgba(201,180,159,.2);border-radius:13px;padding:9px 8px;text-align:center;}
  .pill .n{font-family:'Cairo';font-weight:800;font-size:22px;line-height:1;}
  .pill .l{font-size:10.5px;margin-top:4px;letter-spacing:.4px;text-transform:uppercase;font-weight:700;color:var(--sand-soft);}
  .pill.r .n{color:#F0A99D;} .pill.y .n{color:#EBC873;} .pill.g .n{color:#A6CFA4;}
  .pill.r.alert{animation:glow 1.9s ease-in-out infinite;}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(240,120,100,0);}50%{box-shadow:0 0 0 4px rgba(240,120,100,.18);}}

  main{padding:16px 14px 8px;}
  .eyebrow{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--maroon);font-weight:800;margin:0 2px 3px;}
  .sec{display:flex;align-items:baseline;gap:9px;margin:2px 2px 13px;}
  .sec h2{font-family:'Cairo';font-weight:700;font-size:17px;margin:0;color:var(--ink);}
  .sec .c{font-size:12px;color:var(--muted);font-weight:700;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 14px;
    margin-bottom:10px;box-shadow:var(--shadow);animation:rise .32s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .row1{display:flex;align-items:flex-start;gap:10px;}
  .names{min-width:0;flex:1;}
  .en{font-weight:700;font-size:15.5px;line-height:1.25;color:var(--ink);}
  .ar{font-size:14px;color:var(--muted);margin-top:1px;font-weight:500;}
  .chip{flex:0 0 auto;font-family:'Cairo';font-weight:700;font-size:11px;padding:5px 10px;border-radius:999px;letter-spacing:.3px;}
  .chip.red{background:var(--red-bg);color:var(--red-ink);}
  .chip.yellow{background:var(--amber-bg);color:var(--amber-ink);}
  .chip.green{background:var(--green-bg);color:var(--green-ink);}
  .chip.none{background:#ECE4D8;color:#8A7867;}
  .meta{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:9px;font-size:12.5px;}
  .meta .k{color:var(--muted);font-weight:500;}
  .meta b{font-weight:700;color:var(--ink);}
  .supplier{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--maroon);}
  .note{margin-top:8px;font-size:12.5px;color:var(--maroon);background:#F3E9E5;border-radius:9px;padding:6px 9px;}

  .buy .card{display:flex;gap:12px;align-items:flex-start;}
  .tick{flex:0 0 24px;width:24px;height:24px;margin-top:2px;border:2px solid var(--line);border-radius:8px;
    display:grid;place-items:center;cursor:pointer;transition:.15s;background:#fff;}
  .tick.on{background:var(--green);border-color:var(--green);}
  .tick svg{opacity:0;transition:.15s;} .tick.on svg{opacity:1;}
  .buy .body{flex:1;min-width:0;}
  .card.done{opacity:.5;} .card.done .en{text-decoration:line-through;}

  .grp{font-family:'Cairo';font-weight:700;font-size:12.5px;color:var(--maroon);
    margin:16px 4px 8px;display:flex;align-items:center;gap:7px;}
  .grp::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--sand);outline:2px solid var(--maroon);}
  .grp:first-of-type{margin-top:2px;}

  .search{position:relative;margin:0 2px 12px;}
  .search input{width:100%;padding:12px 14px 12px 40px;border:1px solid var(--line);border-radius:13px;
    font-family:inherit;font-size:15px;background:var(--card);color:var(--ink);}
  .search input:focus{outline:2px solid var(--maroon);outline-offset:-1px;}
  .search svg{position:absolute;left:13px;top:12px;color:var(--muted);}
  .filters{display:flex;gap:7px;overflow-x:auto;padding:0 2px 12px;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .fbtn{flex:0 0 auto;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--card);
    font-family:inherit;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;}
  .fbtn.on{background:var(--maroon);color:var(--sand);border-color:var(--maroon);}

  .ov-cat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 14px;margin-bottom:9px;box-shadow:var(--shadow);}
  .ov-cat .top{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .ov-cat .name{font-weight:700;font-size:14.5px;}
  .ov-cat .tot{font-size:12px;color:var(--muted);font-weight:700;text-align:right;}
  .bar{display:flex;height:8px;border-radius:6px;overflow:hidden;margin-top:9px;background:#ECE4D8;}
  .bar i{display:block;height:100%;}
  .bar .r{background:var(--red);} .bar .y{background:var(--amber);} .bar .g{background:var(--green);}

  .empty{text-align:center;padding:48px 24px;color:var(--muted);}
  .empty .big{font-family:'Cairo';font-weight:700;font-size:17px;color:var(--ink);margin-bottom:6px;}
  .empty svg{margin-bottom:12px;}
  .loader{text-align:center;padding:60px 20px;color:var(--muted);}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--maroon);border-radius:50%;
    animation:spin 1s linear infinite;margin:0 auto 14px;}
  .err{background:var(--red-bg);color:var(--red-ink);border-radius:14px;padding:16px;margin:4px 2px;font-size:14px;line-height:1.55;}
  .err b{font-family:'Cairo';}
  .err button{margin-top:12px;background:var(--maroon);color:var(--sand);border:none;padding:9px 18px;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer;}

  nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);
    display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 14px rgba(42,16,23,.05);}
  nav button{flex:1;background:none;border:none;padding:9px 4px 8px;display:flex;flex-direction:column;
    align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-family:'Cairo';font-weight:700;font-size:11px;position:relative;}
  nav button.on{color:var(--maroon);}
  nav button .ico{position:relative;}
  nav .badge{position:absolute;top:-5px;right:-9px;background:var(--red);color:#fff;font-size:10px;font-weight:800;
    min-width:17px;height:17px;border-radius:9px;display:grid;place-items:center;padding:0 4px;font-family:'Tajawal';}
  nav button.on::after{content:"";position:absolute;top:0;width:26px;height:3px;border-radius:0 0 3px 3px;background:var(--maroon);}
  .hidden{display:none;}
  .stamp{text-align:center;font-size:11.5px;color:var(--muted);padding:2px 0 14px;font-weight:500;}

  /* chef status editor */
  .se-wrap{display:flex;gap:6px;margin-top:11px;}
  .se{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid var(--line);background:#fff;
    font-family:'Cairo';font-weight:700;font-size:11.5px;color:var(--muted);cursor:pointer;transition:.15s;}
  .se.red.on{background:var(--red-bg);border-color:var(--red);color:var(--red-ink);}
  .se.yellow.on{background:var(--amber-bg);border-color:var(--amber);color:var(--amber-ink);}
  .se.green.on{background:var(--green-bg);border-color:var(--green);color:var(--green-ink);}
  .se:active{transform:scale(.96);}
  .hint{font-size:12px;color:var(--muted);margin:0 3px 12px;font-weight:500;}

  /* add button */
  .addbtn{width:100%;padding:13px;border-radius:13px;border:1.5px dashed var(--maroon);background:#F3E9E5;
    color:var(--maroon);font-family:'Cairo';font-weight:700;font-size:14px;cursor:pointer;margin-bottom:12px;
    display:flex;align-items:center;justify-content:center;gap:8px;}
  .addbtn:active{transform:scale(.99);}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(42,16,23,.5);z-index:50;display:none;align-items:flex-end;justify-content:center;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--bg);width:100%;max-width:640px;border-radius:20px 20px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:up .25s ease;}
  @keyframes up{from{transform:translateY(30px);opacity:.6;}to{transform:none;opacity:1;}}
  .modal h3{font-family:'Cairo';font-weight:800;margin:0 0 14px;color:var(--maroon);font-size:19px;}
  .fld{margin-bottom:11px;}
  .fld label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px;}
  .fld input,.fld select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:11px;
    font-family:inherit;font-size:15px;background:#fff;color:var(--ink);}
  .fld input:focus,.fld select:focus{outline:2px solid var(--maroon);outline-offset:-1px;}
  .modal-actions{display:flex;gap:9px;margin-top:16px;}
  .modal-actions button{flex:1;padding:13px;border-radius:12px;border:none;font-family:'Cairo';font-weight:700;font-size:15px;cursor:pointer;}
  .btn-cancel{background:#EAE0D2;color:var(--ink);}
  .btn-save{background:var(--maroon);color:var(--sand);}
  .btn-save:disabled{opacity:.6;}

  /* toast */
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-weight:600;font-size:14px;
    z-index:60;transition:.25s;pointer-events:none;max-width:88%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.err{background:var(--red);}
</style>
</head>

<script>
// ====== CONFIG ======
// Method A (current): your Publish-to-web CSV link.
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_KF0BKOVwYPB4g3IWjGEh5NmVEjdHC4zebL19oBnG274GRHDO-KQXYqZH1oNGDoCQ8h_-QNgswL9P/pub?gid=1342485507&single=true&output=csv";
// Method B (most reliable): raw sheet ID from the normal edit URL + the tab's gid.
// Leave RAW_ID empty to use Method A. Fill it to switch to the bulletproof Google data endpoint.
const RAW_ID = "1jIqmzrJmaAq7S1gasW-luoexj1GmiPPMQJo1K_PVxnc";
const RAW_GID = "1342485507";
// ====== EDITING (Chef) — paste your Apps Script Web App /exec URL between the quotes ======
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx_Q6h7EQ92Fq6mdYy3kbQolR4AWHqC1aPM7M0syEy_AA4aZMywz5-lVDDBUeAjR-vMEA/exec";
const API_TOKEN = "mudakhan-8471";        // must match the TOKEN in the Apps Script

let ITEMS = [], bought = new Set(), current = 'buy';

function pick(headers, ...needles){
  const low = headers.map(h => (h||'').toString().toLowerCase());
  for(const n of needles){ const i = low.findIndex(h => h.includes(n)); if(i!==-1) return headers[i]; }
  return null;
}
function normStatus(v){
  const s=(v||'').toString().trim().toLowerCase();
  if(!s) return 'none';
  if(/red|urgent|أحمر/.test(s)) return 'red';
  if(/yellow|amber|low|أصفر/.test(s)) return 'yellow';
  if(/green|ok|available|أخضر/.test(s)) return 'green';
  return 'none';
}
const STLABEL={red:'Urgent',yellow:'Low',green:'In stock',none:'—'};

function parseRows(rows){
  if(!rows.length) return [];
  const H=Object.keys(rows[0]);
  const cEn=pick(H,'english','item name','item','name','صنف')||H[0];
  const cAr=pick(H,'عربي','arabic')||H[1]||null;
  const cCat=pick(H,'category','قسم','فئة');
  const cUnit=pick(H,'unit','وحدة');
  const cSt=pick(H,'status','حالة');
  const cSup=pick(H,'supplier','vendor','shop','مورد','محل');
  const cNote=pick(H,'note','ملاحظ');
  return rows.map(r=>({
    en:(r[cEn]||'').trim(), ar:cAr?(r[cAr]||'').trim():'',
    cat:cCat?(r[cCat]||'').trim():'', unit:cUnit?(r[cUnit]||'').trim():'',
    status:normStatus(cSt?r[cSt]:''), supplier:cSup?(r[cSup]||'').trim():'',
    note:cNote?(r[cNote]||'').trim():'',
  })).filter(x=>x.en);
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

const SHARE_MSG="Couldn't read the sheet. In Google Sheets open <b>Share</b> → set <b>General access</b> to <b>Anyone with the link · Viewer</b>, then tap Try again. That permission is what lets the app read your data.";

function spinOn(){document.getElementById('refreshBtn').classList.add('spin');
  document.getElementById('loader').classList.remove('hidden');
  document.getElementById('content').classList.add('hidden');}
function spinOff(){document.getElementById('refreshBtn').classList.remove('spin');}

function load(){ spinOn(); if(RAW_ID) loadGviz(); else loadCsv(); }

// PRIMARY: gviz JSONP via <script> tag — no CORS, works from a local file, hosted link, or phone
function loadGviz(){
  const cb='gviz_cb_'+Date.now();
  let done=false;
  const s=document.createElement('script');
  function cleanup(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode) s.remove(); }
  const timer=setTimeout(()=>{ if(done)return; done=true; cleanup(); loadCsv(); },12000);
  window[cb]=function(resp){
    if(done)return; done=true; clearTimeout(timer); cleanup();
    try{
      const t=resp.table;
      const labels=t.cols.map((c,i)=>(c.label&&c.label.trim())?c.label.trim():(c.id||('col'+i)));
      const rows=t.rows.map(r=>{const o={};(r.c||[]).forEach((cell,i)=>{o[labels[i]]=cell&&cell.v!=null?cell.v:'';});return o;});
      const parsed=parseRows(rows);
      if(!parsed.length){ spinOff(); showError(SHARE_MSG); return; }
      ITEMS=parsed; spinOff(); render();
    }catch(e){ loadCsv(); }
  };
  s.onerror=()=>{ if(done)return; done=true; clearTimeout(timer); cleanup(); loadCsv(); };
  s.src=`https://docs.google.com/spreadsheets/d/${RAW_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&headers=1&gid=${RAW_GID}&_=${Date.now()}`;
  document.body.appendChild(s);
}

// FALLBACK: published CSV through relays (used only if JSONP is unavailable)
async function loadCsv(){
  const base=CSV_URL+"&_="+Date.now();
  const routes=[base,
    "https://api.allorigins.win/raw?url="+encodeURIComponent(base),
    "https://corsproxy.io/?url="+encodeURIComponent(base),
    "https://api.codetabs.com/v1/proxy/?quest="+encodeURIComponent(base)];
  for(const url of routes){
    try{
      const r=await fetch(url,{redirect:'follow'});
      if(!r.ok) continue;
      const text=await r.text();
      if(!text||text.trim().charAt(0)==='<') continue;
      const res=Papa.parse(text,{header:true,skipEmptyLines:true});
      const parsed=parseRows(res.data);
      if(!parsed.length) continue;
      ITEMS=parsed; spinOff(); render(); return;
    }catch(e){}
  }
  spinOff(); showError(SHARE_MSG);
}
function showError(msg){
  document.getElementById('loader').classList.add('hidden');
  const c=document.getElementById('content'); c.classList.remove('hidden');
  c.innerHTML=`<div class="err"><b>Can't load right now</b><br>${msg}<br><button onclick="load()">Try again</button></div>`;
}

// ====== WRITE GATEWAY (JSONP to Apps Script) ======
function apiCall(params){
  return new Promise((resolve,reject)=>{
    if(!APPS_SCRIPT_URL){ reject(new Error('not connected')); return; }
    const cb='api_cb_'+Date.now()+'_'+Math.floor(Math.random()*1e5);
    const s=document.createElement('script');
    let done=false;
    function clean(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode)s.remove(); }
    const timer=setTimeout(()=>{ if(done)return; done=true; clean(); reject(new Error('timeout')); },15000);
    window[cb]=function(res){ if(done)return; done=true; clearTimeout(timer); clean(); resolve(res); };
    s.onerror=()=>{ if(done)return; done=true; clearTimeout(timer); clean(); reject(new Error('network')); };
    const q=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    s.src=APPS_SCRIPT_URL+'?'+q+'&token='+encodeURIComponent(API_TOKEN)+'&callback='+cb+'&_='+Date.now();
    document.body.appendChild(s);
  });
}
let toastTimer;
function toast(msg,isErr){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.toggle('err',!!isErr); t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}
function updateTally(){
  const c=counts();
  document.getElementById('cRed').textContent=c.red;
  document.getElementById('cYel').textContent=c.yellow;
  document.getElementById('cGrn').textContent=c.green;
  document.querySelector('.pill.r').classList.toggle('alert',c.red>0);
  const need=c.red+c.yellow,badge=document.getElementById('buyBadge');
  badge.textContent=need; badge.classList.toggle('hidden',need===0);
}
// Chef sets a status (optimistic UI, then saves to the sheet)
async function setItemStatus(btn,status){
  const card=btn.closest('.card'); const en=card.dataset.en;
  const item=ITEMS.find(x=>x.en===en); if(!item||item.status===status) return;
  if(!APPS_SCRIPT_URL){ toast("Chef editing isn't connected yet",true); return; }
  const prev=item.status; item.status=status;
  card.querySelectorAll('.se').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const chip=card.querySelector('.chip'); if(chip){ chip.className='chip '+status; chip.textContent=STLABEL[status]; }
  updateTally();
  try{
    const res=await apiCall({action:'setStatus',item:en,status:status});
    if(!res||!res.ok) throw new Error((res&&res.error)||'failed');
    toast('Saved ✓');
  }catch(e){
    item.status=prev;
    card.querySelectorAll('.se').forEach(b=>b.classList.toggle('on',b.classList.contains(prev)));
    if(chip){ chip.className='chip '+prev; chip.textContent=STLABEL[prev]; }
    updateTally();
    toast(e.message==='not connected'?"Editing isn't connected yet":'Could not save — check connection',true);
  }
}
// Add item
function openAdd(){ document.getElementById('addModal').classList.add('show'); }
function closeAdd(){ document.getElementById('addModal').classList.remove('show'); }
async function submitAdd(){
  const en=document.getElementById('f_en').value.trim();
  if(!en){ toast('Enter an item name',true); return; }
  if(!APPS_SCRIPT_URL){ toast("Editing isn't connected yet",true); return; }
  const payload={action:'add', en,
    ar:document.getElementById('f_ar').value.trim(),
    cat:document.getElementById('f_cat').value.trim(),
    unit:document.getElementById('f_unit').value.trim(),
    status:document.getElementById('f_status').value,
    supplier:document.getElementById('f_sup').value.trim(),
    notes:document.getElementById('f_note').value.trim()};
  const btn=document.getElementById('saveBtn'); btn.textContent='Adding…'; btn.disabled=true;
  try{
    const res=await apiCall(payload);
    if(!res||!res.ok) throw new Error((res&&res.error)||'failed');
    toast('Added ✓'); closeAdd();
    ['f_en','f_ar','f_cat','f_unit','f_sup','f_note'].forEach(id=>document.getElementById(id).value='');
    load();
  }catch(e){ toast('Could not add — check connection',true); }
  finally{ btn.textContent='Add to sheet'; btn.disabled=false; }
}

function stamp(){
  const t=new Date().toLocaleString([], {hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'});
  document.getElementById('stamp-top').textContent="Updated "+t;
  const sb=document.getElementById('stamp-bottom'); if(sb) sb.textContent="Live from your Google Sheet · updated "+t;
}
function counts(){const c={red:0,yellow:0,green:0,none:0};ITEMS.forEach(i=>c[i.status]++);return c;}
function render(){
  document.getElementById('loader').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');
  const c=counts();
  document.getElementById('cRed').textContent=c.red;
  document.getElementById('cYel').textContent=c.yellow;
  document.getElementById('cGrn').textContent=c.green;
  document.querySelector('.pill.r').classList.toggle('alert',c.red>0);
  const need=c.red+c.yellow, badge=document.getElementById('buyBadge');
  badge.textContent=need; badge.classList.toggle('hidden',need===0);
  stamp(); renderBuy(); renderAll(); renderOverview();
}
function itemCard(i,opts={}){
  const meta=[];
  if(i.unit) meta.push(`<span><span class="k">Unit</span> <b>${esc(i.unit)}</b></span>`);
  if(i.cat)  meta.push(`<span><span class="k">Cat</span> <b>${esc(i.cat)}</b></span>`);
  if(opts.supplier!==false && i.supplier) meta.push(`<span class="supplier"><span class="dot"></span><b>${esc(i.supplier)}</b></span>`);
  return `<div class="row1"><div class="names"><div class="en">${esc(i.en)}</div>${i.ar?`<div class="ar" dir="rtl">${esc(i.ar)}</div>`:''}</div><span class="chip ${i.status}">${STLABEL[i.status]}</span></div>${meta.length?`<div class="meta">${meta.join('')}</div>`:''}${(opts.note!==false&&i.note)?`<div class="note">${esc(i.note)}</div>`:''}`;
}
function renderBuy(){
  const el=document.getElementById('view-buy');
  const list=ITEMS.filter(i=>i.status==='red'||i.status==='yellow');
  if(!list.length){el.innerHTML=`<div class="empty"><svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#3E8E4F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg><div class="big">Nothing to buy</div>Every item is in stock. Nothing flagged Red or Yellow.</div>`;return;}
  const order={red:0,yellow:1};
  list.sort((a,b)=>order[a.status]-order[b.status]||a.supplier.localeCompare(b.supplier));
  const groups={}; list.forEach(i=>{const k=i.supplier||'__none__';(groups[k]=groups[k]||[]).push(i);});
  const keys=Object.keys(groups).sort((a,b)=>a==='__none__'?1:b==='__none__'?-1:a.localeCompare(b));
  let html=`<div class="eyebrow">For Mohammed</div><div class="sec"><h2>Shopping list</h2><span class="c">${list.length} item${list.length>1?'s':''}</span></div>`;
  keys.forEach(k=>{
    html+=`<div class="grp">${k==='__none__'?'No supplier set':esc(k)}</div>`;
    groups[k].forEach(i=>{
      const id=i.en+'|'+i.ar, done=bought.has(id);
      html+=`<div class="card ${done?'done':''}" data-id="${esc(id)}"><div class="tick ${done?'on':''}" onclick="toggleBuy(this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div><div class="body">${itemCard(i)}</div></div>`;
    });
  });
  el.innerHTML=html;
}
function toggleBuy(node){
  const card=node.closest('.card'), id=card.dataset.id;
  if(bought.has(id)){bought.delete(id);node.classList.remove('on');card.classList.remove('done');}
  else{bought.add(id);node.classList.add('on');card.classList.add('done');}
}
let allFilter='All', allQuery='';
function renderAll(){
  const el=document.getElementById('view-all');
  const cats=['All',...Array.from(new Set(ITEMS.map(i=>i.cat).filter(Boolean))).sort()];
  const filters=cats.map(c=>`<button class="fbtn ${c===allFilter?'on':''}" onclick="setFilter('${esc(c).replace(/'/g,"\\'")}')">${esc(c)}</button>`).join('');
  let list=ITEMS.slice();
  if(allFilter!=='All') list=list.filter(i=>i.cat===allFilter);
  if(allQuery){const q=allQuery.toLowerCase();list=list.filter(i=>i.en.toLowerCase().includes(q)||i.ar.includes(allQuery)||(i.supplier||'').toLowerCase().includes(q));}
  const rank={red:0,yellow:1,green:2,none:3};
  list.sort((a,b)=>rank[a.status]-rank[b.status]||a.en.localeCompare(b.en));
  const cards=list.length?list.map(i=>`<div class="card" data-en="${esc(i.en)}">${itemCard(i)}
      <div class="se-wrap">
        <button class="se red ${i.status==='red'?'on':''}" onclick="setItemStatus(this,'red')">Urgent</button>
        <button class="se yellow ${i.status==='yellow'?'on':''}" onclick="setItemStatus(this,'yellow')">Low</button>
        <button class="se green ${i.status==='green'?'on':''}" onclick="setItemStatus(this,'green')">In stock</button>
      </div></div>`).join(''):`<div class="empty"><div class="big">No matches</div>Try a different word or category.</div>`;
  el.innerHTML=`<button class="addbtn" onclick="openAdd()">＋ Add item</button>
    <div class="hint">Tap a status below any item to update it — it saves straight to the sheet.</div>
    <div class="search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="searchBox" placeholder="Search item or supplier…" value="${esc(allQuery)}" oninput="onSearch(this.value)"></div><div class="filters">${filters}</div>${cards}`;
}
function setFilter(c){allFilter=c;renderAll();}
function onSearch(v){allQuery=v;renderAll();const sb=document.getElementById('searchBox');if(sb){sb.focus();sb.setSelectionRange(sb.value.length,sb.value.length);}}
function renderOverview(){
  const el=document.getElementById('view-ov');
  const total=ITEMS.length, cats={};
  ITEMS.forEach(i=>{const k=i.cat||'Uncategorised';(cats[k]=cats[k]||{red:0,yellow:0,green:0,none:0,t:0});cats[k][i.status]++;cats[k].t++;});
  const keys=Object.keys(cats).sort((a,b)=>(cats[b].red-cats[a].red)||(cats[b].t-cats[a].t));
  let html=`<div class="eyebrow">Full picture</div><div class="sec"><h2>Overview</h2><span class="c">${total} items</span></div>`;
  keys.forEach(k=>{
    const d=cats[k], pr=d.red/d.t*100, py=d.yellow/d.t*100, pg=(d.green+d.none)/d.t*100, parts=[];
    if(d.red)parts.push(`${d.red} urgent`); if(d.yellow)parts.push(`${d.yellow} low`);
    html+=`<div class="ov-cat"><div class="top"><span class="name">${esc(k)}</span><span class="tot">${parts.length?parts.join(' · '):'all stocked'} · ${d.t}</span></div><div class="bar"><i class="r" style="width:${pr}%"></i><i class="y" style="width:${py}%"></i><i class="g" style="width:${pg}%"></i></div></div>`;
  });
  el.innerHTML=html;
}
function setView(v){
  current=v;
  if(v==='buy') renderBuy(); else if(v==='all') renderAll(); else renderOverview();
  ['buy','all','ov'].forEach(x=>{
    document.getElementById('view-'+x).classList.toggle('hidden',x!==v);
    document.getElementById('nav-'+x).classList.toggle('on',x===v);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('refreshBtn').onclick=load;
load();
</script>
